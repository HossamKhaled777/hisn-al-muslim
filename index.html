            { id: 'r3', category: 'RUQYAH', count: 7, text: '﴿وَاتَّبَعُوا مَا تَتْلُو الشَّيَاطِينُ عَلَىٰ مُلْكِ سُلَيْمَانَ ۖ وَمَا كَفَرَ سُلَيْمَانُ وَلَٰكِنَّ الشَّيَاطِينَ كَفَرُوا يُعَلِّمُونَ النَّاسَ السِّحْرَ وَمَا أُنزِلَ عَلَى الْمَلَكَيْنِ بِبَابِلَ هَارُوتَ وَمارُوتَ ۚ وَمَا يُعَلِّمَانِ مِنْ أَحَدٍ حَتَّىٰ يَقُولَا إِنَّمَا نَحْنُ فِتْنَةٌ فَلَا تَكْفُرْ ۖ فَيَتَعَلَّمُونَ مِنْهُمَا مَا يُفَرِّقُونَ بِهِ بَيْنَ الْمَرْءِ وَزَوْجِهِ ۚ وَمَا هُم بِضَارِّينَ بِهِ مِنْ أَحَدٍ إِلَّا بِإِذْنِ اللَّهِ ۚ وَيَتَعَلَّمُونَ مَا يَضُرُّهُمْ وَلَا يَنفَعُهُمْ ۚ وَلَقَدْ عَلِمُوا لَمَنِ اشْتَرَاهُ مَا لَهُ فِي الْآخِرَةِ مِنْ خَلَاقٍ ۚ وَلَبِئْسَ مَا شَرَوْا بِهِ أَنفُسَهُمْ ۚ لَوْ كَانُوا يَعْلَمُونَ﴾', reference: 'سورة البقرة 102' },

                                        <span className="text-sm font-bold text-emerald-600">{categoryProgress}%</span>
                                    </div>
                                    <div className="w-full bg-gray-100 rounded-full h-2">
                                        <div 
                                            className="bg-emerald-500 h-2 rounded-full transition-all duration-500 ease-out" 
                                            style={{ width: `${categoryProgress}%` }}
                                        ></div>
                                    </div>
                                </div>

                                {/* Adhkar List */}
                                <div className="space-y-4">
                                    {filteredAdhkar.map(item => (
                                        <DhikrCard 
                                            key={item.id} 
                                            item={item} 
                                            currentCount={progress[item.id] || 0} 
                                            onIncrement={() => handleIncrement(item.id, item.count)} 
                                        />
                                    ))}
                                </div>

                                {/* Back Button at Bottom */}
                                {categoryProgress < 100 && (
                                    <div className="pt-8 pb-4">
                                        <button onClick={() => setSelectedCategory(null)} className="w-full flex items-center justify-center gap-2 py-4 px-6 bg-white border border-gray-200 rounded-2xl text-gray-600 font-bold hover:bg-gray-50 transition-all active:scale-95 shadow-sm">
                                            <Icons.Home />
                                            <span>العودة للرئيسية</span>
                                        </button>
                                    </div>
                                )}

                                {/* Completion Celebration */}
                                {categoryProgress === 100 && (
                                    <div className="mt-12 text-center p-8 bg-emerald-50 rounded-3xl border-2 border-dashed border-emerald-200">
                                        <div className="text-emerald-500 mx-auto mb-4 flex justify-center">
                                            <Icons.Sparkles />
                                        </div>
                                        <h3 className="text-xl font-bold text-emerald-800 mb-2">تقبل الله طاعتك!</h3>
                                        <p className="text-emerald-600 mb-6">أتممت {CATEGORIES.find(c => c.id === selectedCategory)?.title} بنجاح.</p>
                                        <button onClick={() => setSelectedCategory(null)} className="w-full px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-200 active:scale-95 transition-all flex items-center justify-center gap-2">
                                            <Icons.Home />
                                            <span>العودة للرئيسية</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="text-center py-8 text-gray-400 text-sm">
                        <p>أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ</p>
                    </footer>
                </div>
            );
        };

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
